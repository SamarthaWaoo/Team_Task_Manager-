<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
  <nav>
    <span>⊞ Team Task Manager</span>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="userRole" style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;background:#f0f4ff;color:#1a73e8;"></span>
      <span id="welcomeMsg" style="font-size:13px;color:#64748b;"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="dashboard">
    <div id="stats" class="stats"></div>

    <div class="section-header">
      <h2>My Projects</h2>
      <!-- Modification 1: Admin-only project actions container -->
      <div id="adminProjectActions" style="display:none; gap:8px;">
        <button class="btn-add" onclick="showAddMember()" style="background:#6366f1;">+ Add Member</button>
        <button class="btn-add" onclick="showCreateProject()">+ New Project</button>
      </div>
    </div>
    <div id="projects" class="projects-grid"></div>

    <div id="tasks-section" style="display:none">
      <div class="section-header">
        <h2 id="tasksTitle">Tasks</h2>
        <!-- Modification 2: Admin-only task creation button -->
        <button id="adminTaskAction" class="btn-add" onclick="showCreateTask()" style="display:none">+ New Task</button>
      </div>
      <div class="tasks-container">
        <div class="tasks-header">
          <span>Task</span>
          <span>Assigned To</span>
          <span>Priority</span>
          <span>Status</span>
        </div>
        <div id="tasks"></div>
      </div>
    </div>
  </div>

  <div id="modal" class="modal" style="display:none">
    <div class="modal-box">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-btns">
        <button onclick="closeModal()" class="btn-cancel">Cancel</button>
        <button onclick="submitModal()" class="btn-submit">Submit</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location = '/';
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    const h = {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'};
    
    // Helper variable for role-based logic
    const isAdmin = user.role === 'admin';

    let currentProject = null;
    let currentProjectName = '';
    let modalAction = null;
    let projectMembers = [];

    document.getElementById('welcomeMsg').textContent = 'Hello, ' + (user.name || 'User');
    document.getElementById('userRole').textContent = (user.role || 'member').toUpperCase();

    // Show Admin Buttons if applicable
    if (isAdmin) {
      document.getElementById('adminProjectActions').style.display = 'flex';
      document.getElementById('adminTaskAction').style.display = 'block';
    }

    async function loadStats() {
      const r = await fetch('/api/tasks/dashboard', {headers: h});
      const d = await r.json();
      document.getElementById('stats').innerHTML = `
        <div class="stat"><b>${d.total}</b><span>Total</span></div>
        <div class="stat"><b>${d.todo}</b><span>To Do</span></div>
        <div class="stat"><b>${d.in_progress}</b><span>In Progress</span></div>
        <div class="stat done"><b>${d.done}</b><span>Done</span></div>
        <div class="stat overdue"><b>${d.overdue}</b><span>Overdue</span></div>`;
    }

    async function loadProjects() {
      const r = await fetch('/api/projects/', {headers: h});
      const ps = await r.json();
      document.getElementById('projects').innerHTML = ps.length
        ? ps.map(p => `
          <div class="card" onclick="loadTasks(${p.id}, '${p.name}')">
            <div class="card-title">${p.name}</div>
            <div class="card-desc">${p.description || 'No description'}</div>
            <div class="card-meta">Click to view tasks →</div>
          </div>`).join('')
        : '<p class="empty">No projects yet.</p>';
    }

    async function loadTasks(pid, pname) {
      currentProject = pid;
      currentProjectName = pname;

      const mr = await fetch(`/api/projects/${pid}/members-list`, {headers: h});
      projectMembers = await mr.json();

      document.getElementById('tasks-section').style.display = 'block';
      document.getElementById('tasksTitle').textContent = pname + ' — Tasks';

      const r = await fetch(`/api/tasks/project/${pid}`, {headers: h});
      const ts = await r.json();

      document.getElementById('tasks').innerHTML = ts.length
        ? ts.map(t => {
            // Find assigned member name
            const assignedMember = projectMembers.find(m => m.id === t.assigned_to);
            const memberName = assignedMember ? assignedMember.name : 'Unassigned';

            return `
            <div class="task ${t.is_overdue ? 'overdue-task' : ''}">
              <div class="task-info">
                <div class="task-title">${t.title}</div>
                ${t.is_overdue ? '<span class="badge-overdue">Overdue</span>' : ''}
                ${t.due_date ? `<div class="task-sub">Due: ${new Date(t.due_date).toLocaleDateString()}</div>` : ''}
              </div>

              <!-- Modification 3: Removed Dropdown - Displaying name as text -->
              <div class="task-controls">
                 <span style="font-size:13px; color:#475569; font-weight:500;">${memberName}</span>
              </div>

              <div><span class="priority ${t.priority}">${t.priority}</span></div>

              <!-- Modification 4: Removed Dropdown - Fixed Status to "To Do" -->
              <div class="task-controls">
                <span class="priority low" style="background:#f0fdf4; color:#16a34a; border:none; padding:4px 12px;">To Do</span>
              </div>
            </div>`;
          }).join('')
        : '<p class="empty">No tasks yet.</p>';

      document.getElementById('tasks-section').scrollIntoView({behavior:'smooth'});
    }

    // These functions (updateStatus/updateAssign) remain for background logic 
    // but the dropdown UI is now removed.
    async function updateStatus(tid, status) {
      await fetch(`/api/tasks/${tid}`, {
        method: 'PATCH', headers: h,
        body: JSON.stringify({status})
      });
      loadStats();
      loadTasks(currentProject, currentProjectName);
    }

    async function updateAssign(tid, assignedTo) {
      await fetch(`/api/tasks/${tid}`, {
        method: 'PATCH', headers: h,
        body: JSON.stringify({
          assigned_to: assignedTo ? parseInt(assignedTo) : null
        })
      });
      loadStats();
      loadTasks(currentProject, currentProjectName);
    }

    function showCreateProject() {
      document.getElementById('modalTitle').textContent = 'Create New Project';
      document.getElementById('modalBody').innerHTML = `
        <input id="pName" placeholder="Project name">
        <textarea id="pDesc" placeholder="Description (optional)" style="height:80px;resize:none;"></textarea>`;
      modalAction = createProject;
      document.getElementById('modal').style.display = 'flex';
    }

    async function createProject() {
      const name = document.getElementById('pName').value.trim();
      if (!name) return alert('Project name is required');
      await fetch('/api/projects/', {
        method: 'POST', headers: h,
        body: JSON.stringify({name, description: document.getElementById('pDesc').value})
      });
      closeModal();
      loadProjects();
    }

    async function showCreateTask() {
      if (!currentProject) return alert('Please click on a project first');
      const mr = await fetch(`/api/projects/${currentProject}/members-list`, {headers: h});
      const members = await mr.json();
      document.getElementById('modalTitle').textContent = 'Create New Task';
      document.getElementById('modalBody').innerHTML = `
        <input id="tTitle" placeholder="Task title">
        <textarea id="tDesc" placeholder="Description (optional)" style="height:60px;resize:none;"></textarea>
        <select id="tPriority">
          <option value="low">Low Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
        <input id="tDue" type="datetime-local">
        <select id="tAssign">
          <option value="">— Assign to member (optional) —</option>
          ${members.map(m => `<option value="${m.id}">${m.name} (${m.email})</option>`).join('')}
        </select>`;
      modalAction = createTask;
      document.getElementById('modal').style.display = 'flex';
    }

    async function createTask() {
      const title = document.getElementById('tTitle').value.trim();
      if (!title) return alert('Task title is required');
      const due = document.getElementById('tDue').value;
      const assigned = document.getElementById('tAssign').value;
      await fetch(`/api/tasks/project/${currentProject}`, {
        method: 'POST', headers: h,
        body: JSON.stringify({
          title,
          description: document.getElementById('tDesc').value,
          priority: document.getElementById('tPriority').value,
          due_date: due || null,
          assigned_to: assigned ? parseInt(assigned) : null
        })
      });
      closeModal();
      loadTasks(currentProject, currentProjectName);
      loadStats();
    }

    function showAddMember() {
      if (!currentProject) return alert('Please click on a project first');
      document.getElementById('modalTitle').textContent = 'Add Member to Project';
      document.getElementById('modalBody').innerHTML = `
        <p style="font-size:13px;color:#64748b;margin-bottom:12px;">User must have a registered account.</p>
        <input id="memberEmail" type="email" placeholder="member@example.com">
        <select id="memberRole">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>`;
      modalAction = addMember;
      document.getElementById('modal').style.display = 'flex';
    }

    async function addMember() {
      const email = document.getElementById('memberEmail').value.trim();
      if (!email) return alert('Email is required');
      const r = await fetch(`/api/projects/${currentProject}/members`, {
        method: 'POST', headers: h,
        body: JSON.stringify({
          email,
          role: document.getElementById('memberRole').value
        })
      });
      const d = await r.json();
      if (d.error) {
        alert('Error: ' + d.error);
      } else {
        closeModal();
        alert('Member added!');
        loadTasks(currentProject, currentProjectName);
      }
    }

    function submitModal() { if (modalAction) modalAction(); }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function logout() { localStorage.clear(); window.location = '/'; }

    loadStats();
    loadProjects();
  </script>
</body>
</html>
