<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">✓</div>
        <h1>Team Task Manager</h1>
        <p>Manage projects and tasks with your team</p>
      </div>

      <div class="tab-buttons">
        <button onclick="showTab('login')" id="loginTab" class="tab-btn active">Login</button>
        <button onclick="showTab('signup')" id="signupTab" class="tab-btn">Sign Up</button>
      </div>

      <div id="login">
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="loginPass" type="password" placeholder="Enter your password">
        </div>
        <button class="btn-primary" onclick="doLogin()">Login to Dashboard</button>
      </div>

      <div id="signup" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input id="signupName" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input id="signupEmail" type="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="signupPass" type="password" placeholder="Create a password">
        </div>
        <button class="btn-primary" onclick="doSignup()">Create Account</button>
      </div>

      <p id="msg"></p>
    </div>
  </div>

  <script>
    function showTab(t) {
      document.getElementById('login').style.display = t === 'login' ? 'block' : 'none';
      document.getElementById('signup').style.display = t === 'signup' ? 'block' : 'none';
      document.getElementById('loginTab').classList.toggle('active', t === 'login');
      document.getElementById('signupTab').classList.toggle('active', t === 'signup');
    }

    async function doLogin() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPass').value
        })
      });
      const d = await r.json();
      if (d.token) {
        localStorage.setItem('token', d.token);
        localStorage.setItem('user', JSON.stringify(d.user));
        window.location = 'dashboard.html';
      } else {
        msg.style.color = '#dc2626';
        msg.textContent = d.error;
      }
    }

    async function doSignup() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      const r = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPass').value
        })
      });
      const d = await r.json();
      if (d.token) {
        localStorage.setItem('token', d.token);
        localStorage.setItem('user', JSON.stringify(d.user));
        window.location = 'dashboard.html';
      } else {
        msg.style.color = '#dc2626';
        msg.textContent = d.error;
      }
    }
  </script>
